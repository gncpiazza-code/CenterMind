# Railway — servicio `engines`
#
# Dashboard (Settings → Source):
#   - Root Directory: ShelfMind-RPA
#   - Railway config file: /ShelfMind-RPA/railway.toml
#
# watchPatterns: solo redeploy si cambia algo del motor RPA (paths desde / del repo).
# Redeploy trigger: 2026-06-01 CC corrida 20:00 AR

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["/ShelfMind-RPA/**"]

[deploy]
# start: ver CMD en Dockerfile (docker-entrypoint.sh, modo scheduler por defecto)
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
