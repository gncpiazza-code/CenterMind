<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="starG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Icono cuadrado 120x120 -->
  <rect x="0" y="0" width="120" height="120" rx="26" ry="26" fill="#42129A"/>

  <!--
    Grilla 2×2 dentro del cuadrado 120×120
    padding=14, gap=8
    TL center=(35,35)  TR center=(85,35)
    BL center=(35,85)  BR center=(85,79) ← estrella sube 6px
  -->

  <!-- TL: Reloj — centro=(35,35) r=18 -->
  <circle cx="35" cy="35" r="18" fill="#F97316"/>
  <line x1="35" y1="35" x2="35" y2="22" stroke="#42129A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="35" y1="35" x2="44" y2="35" stroke="#42129A" stroke-width="3.5" stroke-linecap="round"/>

  <!-- TR: Checkmark — bounding (63,15)-(107,55) -->
  <polyline points="67,37 80,49 105,20" fill="none" stroke="#22C55E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BL: Cruz — centro=(35,85) -->
  <line x1="21" y1="71" x2="49" y2="99" stroke="#EF4444" stroke-width="7" stroke-linecap="round"/>
  <line x1="49" y1="71" x2="21" y2="99" stroke="#EF4444" stroke-width="7" stroke-linecap="round"/>

  <!-- BR: Estrella 5 puntas — centro=(85,79) R=17, r=7 -->
  <polygon
    points="85,62 89.9,74.5 103,75.7 93.5,84.3 96.4,97 85,90 73.6,97 76.5,84.3 67,75.7 80.1,74.5"
    fill="url(#starG)"/>

  <!-- Texto "Shelfy" -->
  <text
    x="140"
    y="83"
    font-family="'Geist', 'Inter', -apple-system, Arial, sans-serif"
    font-size="66"
    font-weight="700"
    fill="#42129A"
    letter-spacing="-2">Shelfy</text>
</svg>
