<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Star gradient para la estrella (amarilla dorada) -->
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- ── Fondo redondeado violeta ── -->
  <rect width="200" height="200" rx="44" ry="44" fill="#42129A"/>

  <!-- ───────────────────────────────────────────────
       GRILLA 2x2  (padding=24, gap=12, celda=70x70)
       TL = (24,24)–(94,94)    TR = (106,24)–(176,94)
       BL = (24,106)–(94,176)  BR = (106,106)–(176,176)
  ─────────────────────────────────────────────────── -->

  <!-- ┌───┬───┐
       │ ⏱ │ ✓ │
       ├───┼───┤
       │ ✕ │ ★ │
       └───┴───┘ -->

  <!-- ── TL: Reloj (naranja) · centro=(59,59) r=32 ── -->
  <circle cx="59" cy="59" r="32" fill="#F97316"/>
  <!-- manecilla hora: 12→ 3 (centro:59,59) recta hacia derecha 14px -->
  <line x1="59" y1="59" x2="59" y2="43" stroke="#42129A" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="59" y1="59" x2="73" y2="59" stroke="#42129A" stroke-width="5.5" stroke-linecap="round"/>

  <!-- ── TR: Checkmark (verde) · bounding box (106,24)-(176,94) ── -->
  <!-- tick: p1=(116,61) p2=(136,78) p3=(167,35) — stroke grueso, centrado visualmente -->
  <polyline
    points="115,62 136,80 167,37"
    fill="none"
    stroke="#22C55E"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- ── BL: Cruz (roja) · centro=(59,141) ── -->
  <line x1="40" y1="122" x2="78" y2="160" stroke="#EF4444" stroke-width="11" stroke-linecap="round"/>
  <line x1="78" y1="122" x2="40" y2="160" stroke="#EF4444" stroke-width="11" stroke-linecap="round"/>

  <!-- ── BR: Estrella de 5 puntas (dorada) · centro=(141,141) r_out=32 r_in=13 ── -->
  <!-- puntos calculados geométricamente: 5 puntas cada 72° empezando en -90° -->
  <polygon
    points="
      141,109
      150.6,131.6
      175,134.2
      157.6,151
      162.4,175
      141,163
      119.6,175
      124.4,151
      107,134.2
      131.4,131.6
    "
    fill="url(#starGrad)"/>
</svg>
