<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado violeta -->
  <rect width="200" height="200" rx="44" ry="44" fill="#42129A"/>

  <!--
    GRILLA 2x2 — cada celda exactamente 76x76px
    padding exterior = 24px | gap = -4px (iconos van hasta el borde de celda)
    TL center = (59, 59)   TR center = (141, 59)
    BL center = (59, 141)  BR center = (141, 133)  ← estrella sube 8px visual fix
  -->

  <!-- TL: Reloj naranja — centro (59,59) r=30 -->
  <circle cx="59" cy="59" r="30" fill="#F97316"/>
  <!-- Manecilla 12→ — 12:00 vertical, 3:00 horizontal -->
  <line x1="59" y1="59" x2="59" y2="35" stroke="#42129A" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="59" y1="59" x2="75" y2="59" stroke="#42129A" stroke-width="5.5" stroke-linecap="round"/>

  <!-- TR: Checkmark verde — contenido en (106,24)→(176,94), centro aprox (141,59) -->
  <polyline
    points="113,61 136,82 170,33"
    fill="none"
    stroke="#22C55E"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- BL: Cruz roja — centro (59,141) -->
  <line x1="38" y1="120" x2="80" y2="162" stroke="#EF4444" stroke-width="12" stroke-linecap="round"/>
  <line x1="80" y1="120" x2="38" y2="162" stroke="#EF4444" stroke-width="12" stroke-linecap="round"/>

  <!-- BR: Estrella 5 puntas dorada — centro (141,131) [subida 10px respecto al centro geométrico] -->
  <!-- R_out=30, R_in=12, center=(141,131) — calculado geométricamente -->
  <polygon
    points="
      141,101
      150.5,122.8
      174,125.3
      157,141.2
      161.6,165
      141,152.8
      120.4,165
      125,141.2
      108,125.3
      131.5,122.8
    "
    fill="url(#starGrad)"/>
</svg>
