<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Ícono cuadrado -->
  <rect width="100" height="100" rx="22" ry="22" fill="#3B0FA0"/>

  <!-- Reloj naranja (arriba izq) -->
  <circle cx="28" cy="30" r="16" fill="#F4681A"/>
  <rect x="26.5" y="17" width="3" height="11" rx="1.5" fill="#3B0FA0"/>
  <rect x="26.5" y="28" width="8" height="3" rx="1.5" fill="#3B0FA0"/>

  <!-- Check verde (arriba der) -->
  <polyline points="60,24 70,36 84,18" fill="none" stroke="#22C55E" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- X roja (abajo izq) -->
  <line x1="16" y1="58" x2="38" y2="82" stroke="#EF4444" stroke-width="8" stroke-linecap="round"/>
  <line x1="38" y1="58" x2="16" y2="82" stroke="#EF4444" stroke-width="8" stroke-linecap="round"/>

  <!-- Estrella amarilla (abajo der) -->
  <polygon points="72,56 75.5,67 87,67 78,74 81,85 72,78 63,85 66,74 57,67 68.5,67"
    fill="#EAB308"/>

  <!-- Texto "Shelfy" -->
  <text x="118" y="68"
    font-family="'Geist', 'Inter', Arial, sans-serif"
    font-size="52"
    font-weight="600"
