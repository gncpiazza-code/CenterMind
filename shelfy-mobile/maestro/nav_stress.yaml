# Stress de navegación — 5 tabs MVP (sesión ya activada).
# Uso: maestro test maestro/nav_stress.yaml
# APK tabaco: com.shelfy.shelfy_mobile.tabaco

appId: com.shelfy.shelfy_mobile.tabaco

---
- launchApp:
    stopApp: false

- extendedWaitUntil:
    visible: "Captura"
    timeout: 30000

# 3 ciclos completos: Captura → CC → Cartera → Objetivos → Stats → Captura
- repeat:
    times: 3
    commands:
      - tapOn: "CC"
      - waitForAnimationToEnd
      - tapOn: "Cartera"
      - waitForAnimationToEnd
      - tapOn: "Objetivos"
      - waitForAnimationToEnd
      - tapOn: "Stats"
      - waitForAnimationToEnd
      - tapOn: "Captura"
      - waitForAnimationToEnd

# Verificar que Captura sigue montada tras el stress
- assertVisible: "Captura"
